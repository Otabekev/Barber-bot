server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/ to the backend — fixes 405 when VITE_API_URL is not injected at build time
    location /api/ {
        proxy_pass https://surprising-magic-production-2dbb.up.railway.app/api/;
        proxy_set_header Host surprising-magic-production-2dbb.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # All routes fall back to index.html (React Router SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
